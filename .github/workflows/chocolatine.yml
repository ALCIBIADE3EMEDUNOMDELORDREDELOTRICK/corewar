name: Chocolatine

on:
  push:
    branches-ignore:
      - "no-ga/**"
  pull_request:
    branches-ignore:
      - "no-ga/**"

env:
  MIRROR_SSH_URL: ${{ vars.MIRROR_URL }}
  EXECUTABLES: ${{ vars.EXECUTABLES }}
  CC: epiclang

jobs:
  precheck:
    runs-on: ubuntu-latest
    environment: variable
    outputs:
      run_jobs: ${{ steps.decide.outputs.run_jobs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - id: decide
        run: |
          if [ "${{ vars.MIRROR_URL }}" = "${{ github.event.repository.ssh_url }}" ]; then
            echo "run_jobs=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_jobs=true" >> "$GITHUB_OUTPUT"
          fi
  check_compilation_and_coding_style:
    needs: precheck
    if: ${{ needs.precheck.outputs.run_jobs == 'true' }}
    environment: variable
    name: Check compilation and coding style
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Run banana-check-repo
        continue-on-error: true
        run: banana-check-repo > repo-style-reports.log
      - name: Build with epiclang
        run: make 2> coding-style-reports.log
        timeout-minutes: 2
      - name: Annotate coding style errors
        shell: bash
        if: always()
        run: |
          status=0;
           while IFS= read -r line;
           do if [[ $line == *generated. ]]; then continue; fi;
           path=${line%%:*};
           severity=$(awk -F'[][]' '{print $4}' <<< "$line");
           error="${line##*\(}";
           error="${error%%\)*}";
           lign=$(awk -F':' '{print $2}' <<< "$line");
           mid=$(awk -F'] ' '{sub(/ \(.*/,"",$3); print $3}' <<< "$line");
           printf '::error file=%s,line=%d,title=%s coding style error::%s - %s\n' "$path" "$lign" "$severity" "$error" "$mid";
           status=1;
           done < <(grep "warning" coding-style-reports.log);
          
            while IFS= read -r line;
            do if [[ $line == *generated. ]]; then continue; fi;
            path=${line%%:*};
            severity=$(awk -F'[][]' '{print $4}' <<< "$line");
            error="${line##*\(}"; error="${error%%\)*}";
            mid=$(awk -F'] ' '{sub(/ \(.*/,"",$3); print $3}' <<< "$line");
            printf '::error file=%s,line=0,title=%s coding style error::%s - %s\n' "$path" "$severity" "$error" "$mid";
            status=1;
            done < <(grep "Banana" repo-style-reports.log);
           exit "$status"
      - name: Check expected executables
        shell: bash
        if: always()
        run: |
          IFS=',' read -r -a bins <<< "$EXECUTABLES"
          status=0
          for bin in "${bins[@]}"; do
            [ -z "$bin" ] && continue
            if [ ! -e "$bin" ]; then
              printf '::error file=%s,title=Missing executable::%s\n' "$bin" "$bin"
              status=1
              continue
            fi
            if [ ! -x "$bin" ]; then
              printf '::error file=%s,title=Non-executable file::%s is not executable\n' "$bin" "$bin"
              status=1
            fi
          done
          exit "$status"
      - if: always()
        run: make clean; rm -rf repo-style-reports.log; rm -rf coding-style-reports.log

  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    needs: check_compilation_and_coding_style
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Run tests
        run: make tests_run
        timeout-minutes: 2

  push_to_mirror:
    environment: variable
    name: Push to mirror
    runs-on: ubuntu-latest
    needs: check_compilation_and_coding_style
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Mirror repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY  }}